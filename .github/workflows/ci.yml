name: CI

on:
  push:
  pull_request:

jobs:
  test-and-score:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e . pytest
      - name: Unit tests
        run: pytest
      - name: Sample scoring run
        run: |
          mcp-radar score --input examples/servers.json --output trust-report.json --markdown trust-report.md || true
